name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Extraction regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  reproducibility:
    name: Offline pipeline reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned runtime (no PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest and assert the corpus is exactly 47 chunks
        run: |
          make ingest
          n=$(grep -cE '^\[[0-9]+\] source=' benchmarks/chunks_sme.txt)
          echo "chunks = $n"
          test "$n" = "47"

      - name: Verify corpus fingerprint matches the gold-label set
        run: make verify

      - name: Auto-label (must be reproducible; 19 proven / 3 abstained)
        run: make label
